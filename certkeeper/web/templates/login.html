{% extends "base.html" %}
{% block content %}
<style>
  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 4rem);
  }
  .login-card {
    width: 100%;
    max-width: 22rem;
    animation: loginFadeIn 0.5s ease-out;
  }
  @keyframes loginFadeIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-brand {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .login-brand-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--primary), #059669);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: "Syne", sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    color: #fff;
    margin-bottom: 1rem;
    box-shadow: 0 4px 24px rgba(16,185,129,0.25);
  }
  .login-brand h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
    text-align: center;
  }
  .login-brand p {
    color: var(--text-muted);
    font-size: 0.8125rem;
  }
  .login-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    box-shadow: var(--shadow-lg);
  }
  .login-form .form-group { margin-bottom: 1rem; }
  .login-form label {
    margin-bottom: 0.35rem;
    font-size: 0.8125rem;
  }
  .login-form input {
    max-width: 100%;
    width: 100%;
  }
  .login-form button {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.65rem 1.25rem;
    font-size: 0.875rem;
  }
  .login-error {
    margin-bottom: 1rem;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">CK</div>
      <h1>CertKeeper</h1>
      <p>证书生命周期管理平台</p>
    </div>

    <div class="login-form">
      {% if error %}
      <div class="error-msg login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" autocomplete="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" autocomplete="current-password" placeholder="请输入密码">
        </div>
        <button type="submit">登录</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
